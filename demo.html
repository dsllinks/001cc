<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智医健康 - 用户中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
        }
        
        .header {
            background-color: #1890ff;
            color: white;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .header .logo {
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }
        
        .header .logo::before {
            content: "Q";
            display: inline-block;
            width: 24px;
            height: 24px;
            background-color: white;
            color: #1890ff;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            margin-right: 8px;
            font-weight: bold;
        }
        
        .header .nav {
            display: flex;
            align-items: center;
        }
        
        .header .nav a {
            color: white;
            text-decoration: none;
            padding: 0 16px;
            height: 64px;
            line-height: 64px;
            transition: all 0.3s;
        }
        
        .header .nav a:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        .header .nav a.active {
            background-color: rgba(255, 255, 255, 0.2);
        }
        
        .header .user {
            display: flex;
            align-items: center;
        }
        
        .header .user span {
            margin-right: 8px;
        }
        
        .container {
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .section {
            margin-bottom: 32px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 16px;
            color: #333;
        }
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .card {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        
        .card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            transform: translateY(-2px);
        }
        
        .card-content {
            flex: 1;
        }
        
        .card-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }
        
        .card-desc {
            font-size: 12px;
            color: #999;
        }
        
        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .icon-user {
            background-color: #e6f7ff;
            color: #1890ff;
        }
        
        .icon-platform {
            background-color: #f6ffed;
            color: #52c41a;
        }
        
        .icon-data {
            background-color: #fff7e6;
            color: #fa8c16;
        }
        
        .icon-group {
            background-color: #f9f0ff;
            color: #722ed1;
        }
        
        .icon-space {
            background-color: #fff2f0;
            color: #ff4d4f;
        }
        
        .icon-hardware {
            background-color: #e8f5ff;
            color: #13c2c2;
        }
        
        .icon-research {
            background-color: #e6f7ff;
            color: #1890ff;
        }
        
        .decorative {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 120px;
            height: 120px;
            background-color: rgba(24, 144, 255, 0.1);
            border-radius: 0 100% 0 0;
        }
        
        .decorative-right {
            left: auto;
            right: 0;
            border-radius: 100% 0 0 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">智医健康 用户中心</div>
        <div class="nav">
            <a href="#" class="active">健康画像</a>
            <a href="#">AI模型管理</a>
            <a href="#">其他</a>
        </div>
        <div class="user">
            <span>陈医生</span>
            <span>医生上线</span>
        </div>
    </div>
    
    <div class="container">
        <div class="section">
            <h2 class="section-title">健康画像</h2>
            <div class="card-grid">
                <div class="card">
                    <div class="card-content">
                        <div class="card-title">用户端-管理端</div>
                        <div class="card-desc">未使用</div>
                    </div>
                    <div class="card-icon icon-user">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                        </svg>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-content">
                        <div class="card-title">用户端-运营平台</div>
                        <div class="card-desc">未使用</div>
                    </div>
                    <div class="card-icon icon-platform">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
                        </svg>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-content">
                        <div class="card-title">智能健康数据标签系统</div>
                        <div class="card-desc">未使用</div>
                    </div>
                    <div class="card-icon icon-data">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99l1.5 1.5z"/>
                        </svg>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-content">
                        <div class="card-title">群体健康画像</div>
                        <div class="card-desc">未使用</div>
                    </div>
                    <div class="card-icon icon-group">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                        </svg>
                    </div>
                </div>
            </div>
            
            <div class="card-grid">
                <div class="card">
                    <div class="card-content">
                        <div class="card-title">全人群多维数字健康空间</div>
                        <div class="card-desc">未使用</div>
                    </div>
                    <div class="card-icon icon-space">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5.5-2.5l7.51-3.49L17.5 6.5 9.99 9.99 6.5 17.5zm5.5-6.6c.61 0 1.1.49 1.1 1.1s-.49 1.1-1.1 1.1-1.1-.49-1.1-1.1.49-1.1 1.1-1.1z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">AI模型管理</h2>
            <div class="card-grid">
                <div class="card">
                    <div class="card-content">
                        <div class="card-title">硬件服务管理</div>
                        <div class="card-desc">未使用</div>
                    </div>
                    <div class="card-icon icon-hardware">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">其他</h2>
            <div class="card-grid">
                <div class="card">
                    <div class="card-content">
                        <div class="card-title">科研管理系统</div>
                        <div class="card-desc">未使用</div>
                    </div>
                    <div class="card-icon icon-research">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-4H8v-2h2V9h2v2h2v2h-2v4z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="decorative"></div>
    <div class="decorative decorative-right"></div>
</body>
</html>
